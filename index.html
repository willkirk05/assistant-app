<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School AI Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.8.162/pdf.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <h2>School AI Assistant</h2>

    <div id="chat"></div>

    <div class="controls">
        <select id="modelSelect">
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="claude-opus-4-1">Claude Opus 4.1</option>
        </select>

        <textarea id="input" placeholder="Type something..." rows="2"></textarea>
        <button onclick="sendMessage()">Send</button>

        <div class="upload">
            <label>📄 Upload File:
                <input type="file" id="fileInput" accept=".txt,.pdf">
            </label>
            <button id="analyzeFileBtn" onclick="analyzeFile()" disabled>Analyze File</button>

            <label>🖼️ Upload Image:
                <input type="file" id="imageInput" accept="image/*">
            </label>
        </div>
    </div>
</body>
</html>
