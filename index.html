<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Assist Forward</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">

        <!-- header and logo -->
        <div class="logo-container">
            <h1>Student Assist Forward</h1>
        </div>

        <!-- model and mode selection -->
        <div class="model-select-container">
            <select id="modelSelect">
                <option value="claude-sonnet-4-6">sonnet 4.6</option>
                <option value="claude-haiku-4-5">haiku 4.5</option>
            </select>

            <select id="modeSelect">
                <option value="school">school</option>
                <option value="code">code</option>
            </select>
        </div>

        <!-- chat display -->
        <div id="chat"></div>

        <!-- input area -->
        <div class="input-area">
            <textarea id="input" placeholder="ask something..."></textarea>
            <button id="sendBtn" class="send-btn">send</button>
        </div>

        <!-- quick actions -->
        <div class="button-container">
            <button id="fileBtn">file</button>
            <button id="imageBtn">image</button>
            <button class="command-btn" data-command="!summary">summary</button>
            <button class="command-btn" data-command="!quiz">quiz</button>
            <button class="command-btn" data-command="!code">code</button>
        </div>

        <!-- hidden inputs -->
        <input type="file" id="fileInput" style="display:none;">
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
    </div>

    <script src="app.js"></script>
</body>
</html>
